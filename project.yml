name: MusicGlass
options:
  bundleIdPrefix: com.anmol
  developmentLanguage: en
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true

# Project-wide build settings. Signing (DEVELOPMENT_TEAM) lives in
# Config/Signing.xcconfig so it survives `xcodegen generate`.
settings:
  base:
    SWIFT_VERSION: "5.0"            # Swift 5 language mode — builds cleanly; bump to 6.0 later if desired
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_EMIT_LOC_STRINGS: YES

targets:

  # ---- Host: LSUIElement menu-bar agent (the bridge + glass popover) ----
  Host:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    sources:
      - path: HostApp
        excludes:
          - "*.entitlements"
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.anmol.musicglass
        PRODUCT_NAME: MusicGlass
        CODE_SIGN_ENTITLEMENTS: HostApp/HostApp.entitlements
    info:
      path: HostApp/Info.plist
      properties:
        CFBundleDisplayName: MusicGlass
        LSMinimumSystemVersion: "26.0"
        NSAppleEventsUsageDescription: "MusicGlass reads and controls Apple Music and Spotify so it can show what's playing and let you play, pause, and skip from the widget."
    dependencies:
      - target: Widget
        embed: true
        link: false

  # ---- Widget: WidgetKit extension embedded in the host ----
  Widget:
    type: app-extension
    platform: macOS
    deploymentTarget: "26.0"
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    sources:
      - path: Widget
        excludes:
          - "*.entitlements"
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.anmol.musicglass.Widget
        PRODUCT_NAME: MusicGlassWidget
        CODE_SIGN_ENTITLEMENTS: Widget/Widget.entitlements
        SKIP_INSTALL: YES
    info:
      path: Widget/Info.plist
      properties:
        CFBundleDisplayName: MusicGlass
        LSMinimumSystemVersion: "26.0"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
